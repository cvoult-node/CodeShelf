<!DOCTYPE html>
<html lang="es" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Codeshelf | Mis Proyectos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:          #080b14;
      --surface:     #111420;
      --surface2:    #1a1d2e;
      --accent:      #e62222;
      --border:      rgba(255,255,255,0.1);
      --text:        #ffffff;
      --text-muted:  #888;
      --radius-btn:  6px;
      --radius-card: 14px;
      --font-mono:   'Space Mono', monospace;
      --font-pixel:  'Press Start 2P', cursive;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      overflow-y: scroll;
      min-height: 100vh;
    }

    /* ── Navbar ── */
    .navbar {
      height: 52px;
      padding: 0 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
      background: rgba(8,11,20,0.85);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo {
      font-family: var(--font-pixel);
      font-size: 11px;
      color: var(--accent);
      letter-spacing: 2px;
    }
    .nav-right { display: flex; align-items: center; gap: 10px; }
    .avatar-circle {
      width: 34px; height: 34px;
      border-radius: 50%;
      border: 2px solid var(--accent);
      background: rgba(230,34,34,0.1);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-pixel);
      font-size: 9px;
      color: var(--accent);
    }
    .btn-logout {
      background: none;
      border: 1px solid var(--border);
      border-radius: var(--radius-btn);
      color: var(--text-muted);
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 2px;
      padding: 6px 12px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-logout:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Feed ── */
    .feed-container {
      max-width: 620px;
      margin: 0 auto;
      padding: 24px 16px;
    }

    /* ── New project button ── */
    .new-project-btn {
      border: 2px dashed var(--border);
      border-radius: var(--radius-card);
      padding: 18px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      margin-bottom: 20px;
      transition: border-color 0.15s, background 0.15s;
      background: none;
      width: 100%;
      text-align: left;
      color: var(--text);
      font-family: var(--font-mono);
    }
    .new-project-btn:hover {
      border-color: var(--accent);
      background: rgba(230,34,34,0.03);
    }
    .plus-square {
      width: 38px; height: 38px;
      background: var(--accent);
      border-radius: var(--radius-btn);
      display: flex; align-items: center; justify-content: center;
      font-weight: bold; font-size: 22px;
      flex-shrink: 0;
      color: #fff;
    }

    /* ── Cards ── */
    #projects-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
      overflow: hidden;
      transition: border-color 0.15s;
    }
    .card:hover { border-color: rgba(230,34,34,0.3); }
    .card-top-line { height: 3px; background: var(--accent); }
    .card-inner { padding: 18px; }
    .card-header {
      display: flex; align-items: center;
      gap: 12px; margin-bottom: 14px;
    }
    .card-icon {
      width: 38px; height: 38px;
      background: rgba(230,34,34,0.12);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-pixel);
      font-size: 11px;
      color: var(--accent);
      flex-shrink: 0;
    }
    .p-title { font-weight: 700; font-size: 13px; }
    .p-meta  { font-size: 9px; color: var(--text-muted); letter-spacing: 2px; margin-top: 3px; }
    .card-preview {
      background: #0d0d0d;
      border-radius: var(--radius-btn);
      padding: 12px;
      margin-bottom: 14px;
      display: flex;
      gap: 8px;
      min-height: 44px;
      align-items: center;
      justify-content: center;
    }
    .card-actions { display: flex; gap: 8px; }
    .btn-open {
      flex: 1;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-btn);
      padding: 10px;
      font-family: var(--font-mono);
      font-weight: 700;
      font-size: 10px;
      letter-spacing: 2px;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-open:hover { opacity: 0.85; }
    .btn-del {
      width: 40px;
      background: rgba(230,34,34,0.06);
      border: 1px solid rgba(230,34,34,0.18);
      border-radius: var(--radius-btn);
      color: var(--accent);
      cursor: pointer;
      font-weight: bold;
      font-size: 18px;
      transition: background 0.15s;
    }
    .btn-del:hover { background: rgba(230,34,34,0.15); }

    /* ── Empty state ── */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
      font-size: 10px;
      letter-spacing: 3px;
    }
    .empty-state span {
      display: block;
      font-size: 32px;
      margin-bottom: 16px;
      opacity: 0.4;
    }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.75);
      display: flex; align-items: center; justify-content: center;
      z-index: 999;
      padding: 16px;
    }
    .modal-overlay.hidden { display: none; }
    .modal-box {
      background: #0f1020;
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
      padding: 32px 28px;
      width: 100%;
      max-width: 360px;
    }
    .modal-title {
      font-family: var(--font-pixel);
      font-size: 12px;
      color: var(--accent);
      margin-bottom: 8px;
    }
    .modal-subtitle {
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 1px;
      margin-bottom: 24px;
    }
    .modal-input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-btn);
      padding: 12px 14px;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 13px;
      outline: none;
      margin-bottom: 8px;
      transition: border-color 0.15s;
    }
    .modal-input:focus { border-color: var(--accent); }
    .modal-hint {
      font-size: 9px;
      color: var(--text-muted);
      letter-spacing: 1px;
      margin-bottom: 20px;
    }
    .modal-actions { display: flex; gap: 8px; }
    .btn-cancel {
      flex: 1;
      background: none;
      border: 1px solid var(--border);
      border-radius: var(--radius-btn);
      color: var(--text-muted);
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 2px;
      padding: 11px;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .btn-cancel:hover { border-color: var(--text-muted); }
    .btn-confirm {
      flex: 2;
      background: var(--accent);
      border: none;
      border-radius: var(--radius-btn);
      color: #fff;
      font-family: var(--font-mono);
      font-weight: 700;
      font-size: 10px;
      letter-spacing: 2px;
      padding: 11px;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-confirm:hover { opacity: 0.85; }
    .btn-confirm:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Loading ── */
    .loading-screen {
      height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 18px;
    }
    .loading-text {
      font-family: var(--font-pixel);
      font-size: 10px;
      color: var(--accent);
      letter-spacing: 4px;
      animation: pulse 1.4s ease-in-out infinite;
    }
    .loading-bar {
      width: 160px; height: 2px;
      background: var(--accent);
      border-radius: 2px;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* ── Auth form ── */
    .auth-screen {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 16px;
    }
    .auth-box {
      width: 100%; max-width: 380px;
      background: #0f0f0f;
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
      padding: 40px 36px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.6);
    }
    .auth-logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .auth-logo-text {
      font-family: var(--font-pixel);
      font-size: 18px;
      color: var(--accent);
      line-height: 2;
      letter-spacing: 3px;
    }
    .auth-tagline {
      font-size: 8px;
      letter-spacing: 5px;
      color: var(--text-muted);
      margin-top: 8px;
      font-family: var(--font-mono);
    }
    .auth-form { display: flex; flex-direction: column; gap: 10px; }
    .auth-input {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-btn);
      padding: 12px 15px;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
    }
    .auth-input:focus { border-color: var(--accent); }
    .btn-auth {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-btn);
      padding: 13px;
      font-family: var(--font-mono);
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 2px;
      cursor: pointer;
      margin-top: 4px;
      transition: opacity 0.15s;
    }
    .btn-auth:hover { opacity: 0.85; }
    .auth-divider {
      display: flex; align-items: center;
      gap: 10px; margin: 18px 0;
    }
    .auth-divider-line { flex: 1; height: 1px; background: var(--border); }
    .auth-divider-text {
      font-size: 9px;
      letter-spacing: 2px;
      color: var(--text-muted);
      font-family: var(--font-mono);
    }
    .btn-google {
      width: 100%; padding: 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: var(--radius-btn);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .btn-google:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.3); }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <!-- ── Loading screen ── -->
  <div id="screen-loading" class="loading-screen">
    <span class="loading-text">CARGANDO...</span>
    <div class="loading-bar"></div>
  </div>

  <!-- ── Auth screen ── -->
  <div id="screen-auth" class="auth-screen hidden">
    <div class="auth-box">
      <div class="auth-logo">
        <div class="auth-logo-text">CODE<br>SHELF</div>
        <p class="auth-tagline">PIXEL FONT STUDIO</p>
      </div>
      <form class="auth-form" id="auth-form">
        <input class="auth-input" type="email"    id="auth-email"    placeholder="Email" autocomplete="email" required>
        <input class="auth-input" type="password" id="auth-password" placeholder="Contraseña" autocomplete="current-password" required>
        <button type="submit" class="btn-auth">ENTRAR / REGISTRAR</button>
      </form>
      <div class="auth-divider">
        <div class="auth-divider-line"></div>
        <span class="auth-divider-text">O</span>
        <div class="auth-divider-line"></div>
      </div>
      <button class="btn-google" id="btn-google">🔑&nbsp;&nbsp;Continuar con Google</button>
      <p id="auth-error" style="color:var(--accent);font-size:10px;margin-top:14px;text-align:center;display:none;"></p>
    </div>
  </div>

  <!-- ── App screen ── -->
  <div id="screen-app" class="hidden">
    <nav class="navbar">
      <span class="logo">CODESHELF</span>
      <div class="nav-right">
        <button class="btn-logout" id="btn-logout">SALIR</button>
        <div class="avatar-circle" id="avatar">U</div>
      </div>
    </nav>

    <main class="feed-container">
      <button class="new-project-btn" id="btn-new-font">
        <div class="plus-square">+</div>
        <div>
          <p style="font-weight:700;font-size:13px;">Nueva fuente</p>
          <p style="font-size:10px;color:var(--text-muted);margin-top:3px;">Crea un nuevo proyecto de pixel font</p>
        </div>
      </button>
      <div id="projects-list"></div>
    </main>
  </div>

  <!-- ── Modal nuevo proyecto ── -->
  <div class="modal-overlay hidden" id="modal-overlay">
    <div class="modal-box">
      <p class="modal-title">NUEVA FUENTE</p>
      <p class="modal-subtitle">Ponle un nombre a tu proyecto</p>
      <input class="modal-input" type="text" id="new-font-name" placeholder="mi-fuente-pixel" maxlength="40">
      <p class="modal-hint">Solo letras, números y guiones</p>
      <div class="modal-actions">
        <button class="btn-cancel" id="close-modal">CANCELAR</button>
        <button class="btn-confirm" id="confirm-create">CREAR</button>
      </div>
    </div>
  </div>

  <!-- ── Card template ── -->
  <template id="tpl-project">
    <div class="card">
      <div class="card-top-line"></div>
      <div class="card-inner">
        <div class="card-header">
          <div class="card-icon">F</div>
          <div>
            <div class="p-title">Nombre</div>
            <div class="p-meta">8PX · 0 GLIFOS</div>
          </div>
        </div>
        <div class="card-preview p-preview"></div>
        <div class="card-actions">
          <button class="btn-open">ABRIR</button>
          <button class="btn-del">×</button>
        </div>
      </div>
    </div>
  </template>

  <script type="module">
    import {
      auth, provider, db,
      signInWithPopup, signOut, onAuthStateChanged,
      signInWithEmailAndPassword, createUserWithEmailAndPassword,
      doc, setDoc, getDocs, collection, query, orderBy, deleteDoc
    } from './src/firebase.js';
    import { renderFeed, initFeedEvents } from './src/Feed.js';

    // ── helpers ──────────────────────────────────
    const show = id => document.getElementById(id).classList.remove('hidden');
    const hide = id => document.getElementById(id).classList.add('hidden');

    // ── cargar proyectos ─────────────────────────
    async function cargarProyectos(user) {
      const q   = query(collection(db, 'usuarios', user.uid, 'proyectos'), orderBy('updatedAt', 'desc'));
      const snp = await getDocs(q);
      return snp.docs.map(d => ({ id: d.id, ...d.data() }));
    }

    // ── callbacks para Feed.js ───────────────────
    function makeCallbacks(user) {
      const onOpen = (proyecto) => {
        sessionStorage.setItem('proyectoActivo', JSON.stringify(proyecto));
        window.location.href = 'editor.html';
      };

      const onDelete = async (id) => {
        await deleteDoc(doc(db, 'usuarios', user.uid, 'proyectos', id));
        const proyectos = await cargarProyectos(user);
        renderFeed(proyectos, onOpen, onDelete);
      };

      const onCreate = async (nombre, size) => {
        const id   = Date.now().toString();
        const ref  = doc(db, 'usuarios', user.uid, 'proyectos', id);
        const data = { nombre, gridSize: size, font: {}, updatedAt: new Date() };
        await setDoc(ref, data);
        const proyectos = await cargarProyectos(user);
        renderFeed(proyectos, onOpen, onDelete);
      };

      return { onOpen, onDelete, onCreate };
    }

    // ── auth state ───────────────────────────────
    onAuthStateChanged(auth, async (user) => {
      hide('screen-loading');

      if (!user) {
        show('screen-auth');
        return;
      }

      // Mostrar inicial del usuario en avatar
      const avatar = document.getElementById('avatar');
      if (avatar && user.email) avatar.textContent = user.email[0].toUpperCase();

      show('screen-app');

      const { onOpen, onDelete, onCreate } = makeCallbacks(user);
      const proyectos = await cargarProyectos(user);
      renderFeed(proyectos, onOpen, onDelete);
      initFeedEvents(onCreate);

      // Logout
      document.getElementById('btn-logout').onclick = () =>
        signOut(auth).then(() => window.location.reload());
    });

    // ── auth form ────────────────────────────────
    document.getElementById('auth-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email    = document.getElementById('auth-email').value.trim();
      const password = document.getElementById('auth-password').value;
      const errEl    = document.getElementById('auth-error');
      errEl.style.display = 'none';
      try {
        await signInWithEmailAndPassword(auth, email, password);
      } catch {
        try {
          await createUserWithEmailAndPassword(auth, email, password);
        } catch (err) {
          errEl.textContent = err.message;
          errEl.style.display = 'block';
        }
      }
    });

    document.getElementById('btn-google').onclick = () =>
      signInWithPopup(auth, provider).catch(err => {
        const errEl = document.getElementById('auth-error');
        errEl.textContent = err.message;
        errEl.style.display = 'block';
      });
  </script>
</body>
</html>
